backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/105surveys
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Insights"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Published", name: "published", widget: "boolean", default: false }
      - { label: "Published Date", name: "published_date", widget: "datetime", format: "YYYY-MM-DD" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["News", "Case Study", "Guide", "Industry Update"]
        default: "News"
      - label: "Service"
        name: "service"
        widget: "select"
        options: ["General", "Measured Building Surveys", "Topographical Surveys", "Utility Services", "Setting Out"]
        default: "General"
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Cover Image", name: "cover_image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
